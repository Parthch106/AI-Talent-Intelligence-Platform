<!DOCTYPE html>
<html>
<head>
    <style>
        .container {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            max-width: 600px;
            margin: 0 auto;
            padding: 20px;
            background-color: #0f172a;
            color: #f8fafc;
            border-radius: 12px;
        }
        .header {
            text-align: center;
            padding: 20px 0;
            border-bottom: 1px solid #1e293b;
        }
        .logo {
            font-size: 24px;
            font-weight: bold;
            color: #8b5cf6;
        }
        .content {
            padding: 30px 0;
            text-align: center;
        }
        .otp-box {
            background-color: #1e293b;
            padding: 20px;
            border-radius: 8px;
            font-size: 32px;
            font-weight: bold;
            letter-spacing: 8px;
            color: #8b5cf6;
            margin: 20px 0;
            border: 1px solid #334155;
        }
        .footer {
            text-align: center;
            font-size: 12px;
            color: #64748b;
            padding-top: 20px;
            border-top: 1px solid #1e293b;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <div class="logo">AIMs Platform</div>
        </div>
        <div class="content">
            <h2>Verify Your Identity</h2>
            <p>Use the following code to complete your password reset request. This code will expire in 10 minutes.</p>
            <div class="otp-box">{{ otp_code }}</div>
            <p>If you didn't request this, you can safely ignore this email.</p>
        </div>
        <div class="footer">
            &copy; 2026 AIMs Talent Intelligence Platform. Secure Neural Core Access.
        </div>
    </div>
</body>
</html>
