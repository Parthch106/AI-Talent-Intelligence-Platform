services:
  # 1. Main Django Web Service
  - type: web
    name: ai-talent-backend
    env: python
    rootDir: backend
    plan: starter # Recommend starter for AI models
    buildCommand: pip install -r requirements.txt && python manage.py collectstatic --noinput && python manage.py migrate
    startCommand: gunicorn core.wsgi:application
    envVars:
      - key: DJANGO_SETTINGS_MODULE
        value: core.settings
      - key: DJANGO_DEBUG
        value: "False"
      - key: DATABASE_URL
        fromDatabase:
          name: ai-talent-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          type: redis
          name: ai-talent-redis
          property: connectionString
      - key: DJANGO_SECRET_KEY
        generateValue: true

  # 2. Celery Worker for Background Tasks
  - type: worker
    name: ai-talent-worker
    env: python
    rootDir: backend
    plan: starter
    buildCommand: pip install -r requirements.txt
    startCommand: celery -A core worker -l info
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: ai-talent-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          type: redis
          name: ai-talent-redis
          property: connectionString

  # 3. Redis Instance for Celery
  - type: redis
    name: ai-talent-redis
    plan: free # Note: Free redis is available in some regions
    ipAllowList: [] # Allow all internal traffic

# Managed PostgreSQL Database
databases:
  - name: ai-talent-db
    plan: free
