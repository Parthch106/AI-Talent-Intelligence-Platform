services:
  db:
    image: postgres:15
    container_name: intern_pipeline_db
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
      POSTGRES_DB: intern_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  neo4j:
    image: neo4j:latest
    container_name: intern_pipeline_neo4j
    environment:
      NEO4J_AUTH: neo4j/password
    ports:
      - "7474:7474"
      - "7687:7687"
    volumes:
      - neo4j_data:/data

  # Vector storage usually runs as a service if using Milvus/Qdrant, 
  # but since I suggested FAISS (library-based), I'll include a placeholder 
  # for any other potential microservice or just local volume.
  # For now, let's just stick to the two main DBs.

volumes:
  postgres_data:
  neo4j_data:
